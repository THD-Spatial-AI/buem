package:
  name: buem
  version: {{ environ.get('GIT_DESCRIBE_TAG', '0.0.0') | replace('v', '') }}

source:
  path: ..

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"

requirements:
  host:
    - python >=3.13
    - pip
  run:
    - python >=3.13
    - coinor-cbc  # [linux]
    - cvxpy
    - flask
    - gunicorn    # [linux]
    - joblib
    - jsonschema
    - marshmallow >=4.0.0
    - marshmallow-dataclass >=8.0.0
    - matplotlib
    - numba
    - numpy
    - openpyxl
    - pandas
    - pip
    - psutil
    - psycopg2
    - pulp
    - pvlib
    - pyarrow
    - python-dotenv
    - scipy
    - sympy

about:
  summary: "Building thermal simulation module (ISO 52016-1 5R1C)"
  license: MIT