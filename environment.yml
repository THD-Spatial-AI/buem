name: buem_env
channels:
  - conda-forge
  - default
dependencies:
  - python=3.13
  # Core scientific
  - coincbc
  - cvxpy
  - flask
  - joblib
  - jsonschema
  - matplotlib
  - numba
  - numpy
  - openpyxl
  - pandas
  - psutil
  - psycopg2
  - pulp
  - pvlib
  - pyarrow
  - python-dotenv
  - scipy
  - sympy
  # Documentation
  - sphinx>=9.0.0
  - sphinx_rtd_theme>=3.0.0
  - pip
  - pip:
    - marshmallow>=4.0.0
    - marshmallow-dataclass>=8.0.0
    - sphinxcontrib-applehelp>=2.0.0
    - sphinxcontrib-devhelp>=2.0.0
    - sphinxcontrib-htmlhelp>=2.1.0
    - sphinxcontrib-qthelp>=2.0.0
    - sphinxcontrib-serializinghtml>=1.1.5
